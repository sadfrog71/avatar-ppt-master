  <rect x="0" y="4" width="1280" height="76" fill="#F4F8FF"/>
  <rect x="50" y="50" width="5" height="24" rx="2" fill="#1E5AA8"/>
  <text x="68" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="800" fill="#0F2D5E">治本方案</text>

  <!-- ===== 左侧：根本原因 ===== -->
  <rect x="50" y="100" width="540" height="200" rx="12" fill="#F0F4FF" stroke="#C5D9F5" stroke-width="1.5"/>
  <rect x="50" y="100" width="540" height="7" rx="3" fill="#1E5AA8"/>

