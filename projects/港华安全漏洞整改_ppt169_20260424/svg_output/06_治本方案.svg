  <line x1="956" y1="494" x2="960" y2="498" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="956" y1="502" x2="960" y2="498" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="870" y1="494" x2="866" y2="498" stroke="#9CA3AF" stroke-width="2"/>
