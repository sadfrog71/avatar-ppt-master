  <rect x="640" y="174" width="52" height="52" rx="10" fill="#DCFCE7"/>
  <rect x="648" y="185" width="14" height="9" rx="2" fill="#16A34A"/>
  <rect x="670" y="185" width="14" height="9" rx="2" fill="#16A34A"/>
