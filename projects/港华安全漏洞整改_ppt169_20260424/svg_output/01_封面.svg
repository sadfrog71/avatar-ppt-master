<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 纯白背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- 顶部细蓝线 -->
  <rect width="1280" height="3" fill="#1E5AA8"/>

  <!-- 左侧深蓝块 -->
  <rect x="0" y="0" width="8" height="720" fill="#1E5AA8"/>

  <!-- 右上角蓝色几何装饰 -->
  <circle cx="1200" cy="0" r="280" fill="#EBF3FF"/>
  <circle cx="1280" cy="200" r="180" fill="#D6E8FF" opacity="0.7"/>
  <circle cx="1000" cy="720" r="200" fill="#EBF3FF"/>

  <!-- 左侧装饰小圆 -->
  <circle cx="100" cy="300" r="6" fill="#1E5AA8" opacity="0.3"/>
  <circle cx="120" cy="330" r="4" fill="#1E5AA8" opacity="0.2"/>
  <circle cx="90" cy="340" r="3" fill="#1E5AA8" opacity="0.15"/>

  <!-- 风险标签 -->
  <rect x="80" y="200" width="108" height="30" rx="15" fill="#1E5AA8"/>
  <text x="134" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">安全整改报告</text>

  <!-- 主标题 -->
  <text x="80" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="58" font-weight="900" fill="#0F2D5E">安全漏洞</text>
  <text x="80" y="375" font-family="Microsoft YaHei, Arial, sans-serif" font-size="58" font-weight="900" fill="#0F2D5E">整改说明</text>

  <!-- 蓝色分隔线 -->
  <rect x="80" y="402" width="72" height="4" rx="2" fill="#1E5AA8"/>

  <!-- 副标题 -->
  <text x="80" y="440" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#4A7BB5">香港红队 · 2026 Red Team Finding</text>

  <!-- 底部信息 -->
  <text x="80" y="600" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8AADCB">面向港华内外部沟通</text>
  <text x="80" y="628" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8AADCB">2026年4月</text>

  <!-- 右侧大标题装饰 -->
  <text x="1050" y="420" font-family="Arial, sans-serif" font-size="180" font-weight="900" fill="#1E5AA8" text-anchor="middle" opacity="0.04">修</text>
  <text x="1150" y="500" font-family="Arial, sans-serif" font-size="80" font-weight="300" fill="#1E5AA8" text-anchor="middle" opacity="0.06">SECURITY</text>
</svg>
