  <text x="190" y="279" font-family="Consolas, monospace" font-size="12" font-weight="600" fill="#1E5AA8" text-anchor="middle">/cmsLogin?redirect=%2F</text>

  
  <text x="80" y="318" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#5A8FC0">攻击者可利用该路径直接访问后台管理登录页面，</text>
  <text x="80" y="338" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#5A8FC0">通过弱口令或社工手段获取管理权限</text>

  
