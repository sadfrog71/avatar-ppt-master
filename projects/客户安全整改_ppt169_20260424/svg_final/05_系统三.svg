  <text x="106" y="220" font-family="Arial, sans-serif" font-size="28" fill="#1E5AA8" text-anchor="middle" font-weight="900">!</text>

  <text x="150" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="800" fill="#0F2D5E">管理登录页暴露于公网</text>
  <text x="150" y="228" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#4A7BB5">/cmsLogin 后台管理登录路径直接暴露，存在被扫描和攻击风险</text>

  
  <path fill="#1E5AA8" opacity="0.1" d="M86,260 H294 A6,6 0 0 1 300,266 V282 A6,6 0 0 1 294,288 H86 A6,6 0 0 1 80,282 V266 A6,6 0 0 1 86,260 Z" />
