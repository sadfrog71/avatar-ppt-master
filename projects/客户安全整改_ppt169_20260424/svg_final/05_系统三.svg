  <text x="756" y="429" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#1C2A1C">接入双因素认证（2FA）</text>
  <text x="680" y="457" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4A7A60">所有管理后台账户强制启用短信或邮箱 2FA 验证，</text>
  <text x="680" y="476" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4A7A60">即使密码泄露也能防止账户被接管</text>

  
