  <text x="712" y="561" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="700" fill="#16A34A" text-anchor="middle">长期</text>
  <text x="756" y="561" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#1C2A1C">VPN 内网访问，移除公网登录入口</text>
  <text x="680" y="589" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4A7A60">VPN 打通后，将后台登录页面从公网完全移除，</text>
  <text x="680" y="608" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4A7A60">仅允许通过 VPN 隧道从内网访问</text>

  
