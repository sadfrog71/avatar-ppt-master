  <text x="712" y="297" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="700" fill="#D97706" text-anchor="middle">临时</text>
  <text x="756" y="297" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#1C2A1C">后台路径随机化 + 强制强认证</text>
  <text x="680" y="325" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4A7A60">将 /cmsLogin 路径改为随机化路径（如 /admin-a7x2），</text>
  <text x="680" y="344" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4A7A60">降低被自动化扫描工具发现的概率</text>

  
