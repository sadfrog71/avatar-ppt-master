  <text x="510" y="268" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="800" fill="#0F2D5E">系统二 · 电子卡系统</text>
  <text x="510" y="288" font-family="Consolas, monospace" font-size="11" fill="#6B95BE">ecard.towngas.com.cn</text>
