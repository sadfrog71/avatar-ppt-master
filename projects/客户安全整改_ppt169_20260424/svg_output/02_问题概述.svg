  <rect x="558" y="307" width="52" height="22" rx="4" fill="#DBEAFE"/>
  <text x="584" y="322" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#2B7BD8" text-anchor="middle">3389</text>

  <!-- 系统3 -->
  <rect x="850" y="220" width="380" height="130" rx="10" fill="#FFFFFF" stroke="#C5D9F5" stroke-width="1.5"/>
  <rect x="850" y="220" width="380" height="6" rx="3" fill="#2B7BD8"/>
