<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    kpi_summary_band
    Purpose: Hero KPI rows rendered as horizontal bands (executive scorecard, OKR check-in, operating dashboard).
    No internal grid lines; each row is a band with multiple typographic weights.
    Canonical: 4-6 KPI rows; each row has metric label, current value (hero), target, delta, and one-line interpretation.
    -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Eyebrow + title -->
    <text x="80" y="80" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#64748B" letter-spacing="2">KPI SUMMARY · OPERATING DASHBOARD</text>
    <text x="80" y="120" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#0F172A">Five KPIs Driving the FY26 Operating Plan</text>

    <g transform="translate(80, 170)">
        <!-- Row banner header (subtle, no fill) -->
        <text x="0" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#64748B" letter-spacing="1.5">METRIC</text>
        <text x="500" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#64748B" letter-spacing="1.5">CURRENT</text>
        <text x="700" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#64748B" letter-spacing="1.5">TARGET</text>
        <text x="900" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#64748B" letter-spacing="1.5">vs PLAN</text>
        <text x="1120" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#64748B" letter-spacing="1.5">INTERPRETATION</text>
        <line x1="0" y1="38" x2="1120" y2="38" stroke="#0F172A" stroke-width="2"/>

        <!-- Row 1: ARR -->
        <text x="0" y="76" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#475569" letter-spacing="1.5">ANNUAL RECURRING REVENUE</text>
        <text x="0" y="98" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#94A3B8">ARR</text>
        <text x="500" y="92" text-anchor="end" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#0F172A">$184M</text>
        <text x="700" y="92" text-anchor="end" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#475569">$180M</text>
        <rect x="800" y="68" width="110" height="30" rx="15" fill="#DCFCE7"/>
        <text x="855" y="89" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#15803D">+2.2%</text>
        <text x="1120" y="88" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#334155">Above plan, growth steady</text>
        <line x1="0" y1="118" x2="1120" y2="118" stroke="#E2E8F0" stroke-width="1"/>

        <!-- Row 2: Net Retention -->
        <text x="0" y="156" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#475569" letter-spacing="1.5">NET REVENUE RETENTION</text>
        <text x="0" y="178" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#94A3B8">NRR (12-mo trailing)</text>
        <text x="500" y="172" text-anchor="end" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#0F172A">118%</text>
        <text x="700" y="172" text-anchor="end" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#475569">115%</text>
        <rect x="800" y="148" width="110" height="30" rx="15" fill="#DCFCE7"/>
        <text x="855" y="169" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#15803D">+3pp</text>
        <text x="1120" y="168" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#334155">Expansion outpacing churn</text>
        <line x1="0" y1="198" x2="1120" y2="198" stroke="#E2E8F0" stroke-width="1"/>

        <!-- Row 3: Gross margin -->
        <text x="0" y="236" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#475569" letter-spacing="1.5">GROSS MARGIN</text>
        <text x="0" y="258" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#94A3B8">Non-GAAP, services + product blended</text>
        <text x="500" y="252" text-anchor="end" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#0F172A">74.5%</text>
        <text x="700" y="252" text-anchor="end" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#475569">76.0%</text>
        <rect x="800" y="228" width="110" height="30" rx="15" fill="#FEE2E2"/>
        <text x="855" y="249" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#B91C1C">-1.5pp</text>
        <text x="1120" y="248" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#334155">Services drag — fix in Q3</text>
        <line x1="0" y1="278" x2="1120" y2="278" stroke="#E2E8F0" stroke-width="1"/>

        <!-- Row 4: Cash burn -->
        <text x="0" y="316" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#475569" letter-spacing="1.5">FREE CASH FLOW MARGIN</text>
        <text x="0" y="338" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#94A3B8">FCF / revenue, trailing 12 mo</text>
        <text x="500" y="332" text-anchor="end" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#0F172A">12.4%</text>
        <text x="700" y="332" text-anchor="end" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#475569">10.0%</text>
        <rect x="800" y="308" width="110" height="30" rx="15" fill="#DCFCE7"/>
        <text x="855" y="329" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#15803D">+2.4pp</text>
        <text x="1120" y="328" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#334155">Strong operating leverage</text>
        <line x1="0" y1="358" x2="1120" y2="358" stroke="#E2E8F0" stroke-width="1"/>

        <!-- Row 5: Headcount efficiency -->
        <text x="0" y="396" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#475569" letter-spacing="1.5">REVENUE PER EMPLOYEE</text>
        <text x="0" y="418" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#94A3B8">Headcount efficiency</text>
        <text x="500" y="412" text-anchor="end" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#0F172A">$412K</text>
        <text x="700" y="412" text-anchor="end" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#475569">$400K</text>
        <rect x="800" y="388" width="110" height="30" rx="15" fill="#DCFCE7"/>
        <text x="855" y="409" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#15803D">+3.0%</text>
        <text x="1120" y="408" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#334155">Backfill discipline working</text>
        <line x1="0" y1="438" x2="1120" y2="438" stroke="#0F172A" stroke-width="2"/>
    </g>

    <!-- Insight strip -->
    <text x="80" y="660" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1D4ED8" letter-spacing="1">SO WHAT</text>
    <text x="80" y="690" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#0F172A">Four of five KPIs above plan; gross margin is the only red — services mix is the lever.</text>
</svg>
